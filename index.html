<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>LONE STAR PROXY</title>
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.2.0/css/all.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom right, #111827, #1f2937);
      color: white;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
    }

    nav h1 {
      font-size: 2rem;
      color: #60a5fa;
      letter-spacing: 2px;
    }

    .featured {
      padding: 40px 20px;
    }

    .featured h1 {
      margin-bottom: 20px;
      color: #93c5fd;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .game-card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(96,165,250,0.3);
    }

    .game-card img {
      width: 100%;
      display: block;
      border-radius: 16px;
    }

    .play-button {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .game-card:hover .play-button {
      opacity: 1;
    }

    .content {
      padding: 30px 20px;
    }

    hr {
      border: none;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 30px;
    }

    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .search input {
      width: 70%;
      max-width: 500px;
      padding: 14px;
      border: none;
      border-radius: 12px 0 0 12px;
      outline: none;
      font-size: 1rem;
    }

    .search button {
      padding: 14px 20px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 1rem;
      border-radius: 0 12px 12px 0;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .search button:hover {
      background: #2563eb;
    }

    #games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    #games a {
      display: block;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #games a:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(96,165,250,0.25);
    }

    #games img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 768px) {
      nav h1 {
        font-size: 1.4rem;
      }

      .search input {
        width: 60%;
      }
    }
  </style>
</head>

</body>
</html>
